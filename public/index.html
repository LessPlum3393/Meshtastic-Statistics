<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Real-time Meshtastic mesh network statistics, map, and charts from the official MQTT broker">
  <title>Meshtastic Statistics — Live Network Dashboard (Beta)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="logo-icon">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          <circle cx="12" cy="12" r="8" stroke-dasharray="4 2" opacity="0.4"/>
        </svg>
        <h1>Meshtastic Statistics <span class="beta-badge">Beta</span></h1>
      </div>
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot"></span>
        <span class="status-text">Connecting...</span>
      </div>
    </div>

    <!-- Tab Navigation -->
    <nav class="tab-nav" id="tabNav">
      <button class="tab-btn active" data-tab="map" id="tabMap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/>
          <path d="M8 2v16M16 6v16"/>
        </svg>
        <span>Map</span>
      </button>
      <button class="tab-btn" data-tab="charts" id="tabCharts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M18 20V10M12 20V4M6 20v-6"/>
        </svg>
        <span>Charts</span>
      </button>
    </nav>

    <div class="header-right">
      <div class="stat-pill" id="statNodes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>0 nodes</span>
      </div>
      <div class="stat-pill" id="statPackets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span>0 packets</span>
      </div>
    </div>
  </header>

  <!-- ═══════════ MAP TAB ═══════════ -->
  <div id="tabContentMap" class="tab-content active">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2>Nodes</h2>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </div>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search nodes..." autocomplete="off">
      </div>
      <div class="node-list" id="nodeList">
        <div class="node-list-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32" opacity="0.4">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          <p>Waiting for nodes...</p>
          <span>Nodes will appear as data arrives from the mesh network</span>
        </div>
      </div>
    </aside>

    <!-- Floating sidebar open button (visible when sidebar is collapsed) -->
    <button class="sidebar-open-btn" id="sidebarOpenBtn" aria-label="Open sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

    <div id="map"></div>
    <div id="nodeDetail" class="node-detail hidden">
      <button class="detail-close" id="detailClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div id="detailContent"></div>
    </div>
    <button class="mobile-sidebar-btn" id="mobileSidebarBtn" aria-label="Toggle node list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <button class="locate-btn" id="locateBtn" aria-label="Find my location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
      </svg>
    </button>
  </div>

  <!-- ═══════════ CHARTS TAB ═══════════ -->
  <div id="tabContentCharts" class="tab-content">
    <div class="charts-container">
      <!-- Active Nodes Over Time -->
      <div class="chart-card chart-full-width">
        <div class="chart-card-header">
          <div class="chart-card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <h3>Active Nodes</h3>
          </div>
          <div class="chart-range-btns" data-chart="nodes">
            <button class="range-btn" data-range="1d">1D</button>
            <button class="range-btn" data-range="7d">7D</button>
            <button class="range-btn" data-range="1m">1M</button>
            <button class="range-btn" data-range="1y">1Y</button>
            <button class="range-btn active" data-range="lifetime">All</button>
          </div>
        </div>
        <div class="chart-wrapper">
          <canvas id="activeNodesChart"></canvas>
        </div>
        <div class="chart-card-footer">
          <div class="chart-stat" id="chartStatCurrent">
            <span class="chart-stat-label">Current</span>
            <span class="chart-stat-value">0</span>
          </div>
          <div class="chart-stat" id="chartStatPeak">
            <span class="chart-stat-label">Peak</span>
            <span class="chart-stat-value">0</span>
          </div>
          <div class="chart-stat" id="chartStatUptime">
            <span class="chart-stat-label">Uptime</span>
            <span class="chart-stat-value">—</span>
          </div>
        </div>
      </div>

      <!-- Packets Over Time -->
      <div class="chart-card chart-full-width">
        <div class="chart-card-header">
          <div class="chart-card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            <h3>Packets</h3>
          </div>
          <div class="chart-range-btns" data-chart="packets">
            <button class="range-btn" data-range="1d">1D</button>
            <button class="range-btn" data-range="7d">7D</button>
            <button class="range-btn" data-range="1m">1M</button>
            <button class="range-btn" data-range="1y">1Y</button>
            <button class="range-btn active" data-range="lifetime">All</button>
          </div>
        </div>
        <div class="chart-wrapper">
          <canvas id="packetsChart"></canvas>
        </div>
        <div class="chart-card-footer">
          <div class="chart-stat" id="chartStatTotalPackets">
            <span class="chart-stat-label">Total</span>
            <span class="chart-stat-value">0</span>
          </div>
          <div class="chart-stat" id="chartStatPosPackets">
            <span class="chart-stat-label">Position</span>
            <span class="chart-stat-value">0</span>
          </div>
          <div class="chart-stat" id="chartStatRate">
            <span class="chart-stat-label">Rate/min</span>
            <span class="chart-stat-value">—</span>
          </div>
        </div>
      </div>

      <!-- Nodes by Role -->
      <div class="chart-card">
        <div class="chart-card-header">
          <div class="chart-card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            <h3>Nodes by Role</h3>
          </div>
        </div>
        <div class="chart-wrapper chart-wrapper-doughnut">
          <canvas id="roleChart"></canvas>
        </div>
      </div>

      <!-- Hardware Distribution -->
      <div class="chart-card">
        <div class="chart-card-header">
          <div class="chart-card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
              <rect x="9" y="9" width="6" height="6"/>
              <line x1="9" y1="1" x2="9" y2="4"/>
              <line x1="15" y1="1" x2="15" y2="4"/>
              <line x1="9" y1="20" x2="9" y2="23"/>
              <line x1="15" y1="20" x2="15" y2="23"/>
              <line x1="20" y1="9" x2="23" y2="9"/>
              <line x1="20" y1="14" x2="23" y2="14"/>
              <line x1="1" y1="9" x2="4" y2="9"/>
              <line x1="1" y1="14" x2="4" y2="14"/>
            </svg>
            <h3>Hardware Models</h3>
          </div>
        </div>
        <div class="chart-wrapper">
          <canvas id="hwChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
